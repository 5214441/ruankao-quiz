<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1769aa">
<title>系统集成项目管理工程师·摸底测试</title>
<style>
:root{--bg:#f4f7fa;--panel:#fff;--text:#172033;--muted:#667085;--line:#d8e0e8;--blue:#1769aa;--soft:#eaf3fb;--ok:#157347;--bad:#b42318}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;-webkit-text-size-adjust:100%}
.wrap{max-width:850px;margin:auto;padding:14px}.hero{background:linear-gradient(135deg,#123b5d,#1769aa);color:#fff;padding:24px 20px;border-radius:18px;margin-bottom:14px}
.hero h1{font-size:24px;margin:0 0 6px}.hero p{margin:3px 0;opacity:.92}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:13px;box-shadow:0 4px 16px rgba(20,40,70,.05)}
.hidden{display:none!important}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.metric{border:1px solid var(--line);border-radius:12px;padding:11px;background:#fbfcfd}.metric small{display:block;color:var(--muted)}.metric strong{font-size:20px}
label.field{display:block;font-weight:650;margin:11px 0 5px}input[type=text]{width:100%;font-size:16px;padding:12px;border:1px solid var(--line);border-radius:11px;background:#fff}
.notice{background:#fff8e6;border-left:4px solid #e4a11b;padding:11px 13px;border-radius:8px;margin-top:12px}button{font:inherit;border:0;border-radius:11px;padding:11px 15px;cursor:pointer;touch-action:manipulation}
.primary{background:var(--blue);color:#fff}.secondary{background:#edf2f7;color:var(--text)}button:disabled{opacity:.4}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.progress{height:9px;background:#e6edf3;border-radius:99px;overflow:hidden;margin:13px 0}.progress div{height:100%;background:var(--blue);transition:.2s}.qnav{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
.qnav button{padding:7px 0;border:1px solid var(--line);background:#eef2f6}.qnav .done{background:var(--soft);border-color:#86b7dc}.qnav .current{background:var(--blue);color:#fff}
.tag{display:inline-block;background:var(--soft);color:var(--blue);padding:4px 10px;border-radius:99px;font-size:13px}.question{font-size:18px;font-weight:700;margin:13px 0}
.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:12px;margin:9px 0;cursor:pointer;font-weight:400}.option.selected{background:var(--soft);border-color:var(--blue)}.option input{margin-top:5px;flex:none}
.actions{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:17px}.actions .right{display:flex;gap:8px;flex-wrap:wrap}.barrow{margin:12px 0}.barhead{display:flex;justify-content:space-between}
.bar{height:10px;background:#e6edf3;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:var(--blue)}.review{border:1px solid var(--line);border-radius:12px;padding:13px;margin:11px 0}
.wrong{color:var(--bad)}.rightans{color:var(--ok)}.foot{text-align:center;color:var(--muted);font-size:13px;margin:18px}.sharebox{background:var(--soft);border-radius:12px;padding:12px;margin-top:12px}
@media(max-width:620px){.wrap{padding:9px}.hero h1{font-size:20px}.grid{grid-template-columns:1fr}.qnav{grid-template-columns:repeat(5,1fr)}.actions,.actions .right{width:100%}.actions button{flex:1}.question{font-size:17px}}
@media print{body{background:#fff}.no-print{display:none!important}.card{box-shadow:none}.hero{background:#fff;color:#000;border:1px solid #bbb}}
</style>
</head>
<body>
<div class="wrap">
<section class="hero"><h1>系统集成项目管理工程师·零基础摸底测试</h1><p>100道原创题库，每次随机抽取20题，建议20分钟</p><p>本测试仅用于备考水平评估，不代表官方真题。</p></section>
<section id="start" class="card">
<h2 style="margin-top:0">填写信息并开始</h2>
<label class="field" for="name">姓名或昵称</label><input id="name" type="text" maxlength="30" placeholder="例如：李明">
<label class="field" for="unit">单位/班级（可不填）</label><input id="unit" type="text" maxlength="50" placeholder="例如：某某公司">
<div class="notice">每次开始都会重新抽题，并随机调整题目和选项顺序。交卷后显示得分、模块分析和错题解析。</div>
<button id="startBtn" class="primary" style="width:100%;margin-top:15px">开始测试</button>
<div class="sharebox"><b>转发方法：</b>直接把当前网页链接发给微信好友即可，苹果手机无需下载文件。</div>
</section>
<section id="quiz" class="hidden">
<div class="card"><div class="top"><div><b id="who"></b><div id="whoUnit" style="font-size:13px;color:var(--muted)"></div></div><div><span id="progressText"></span>　<b id="timer">20:00</b></div></div><div class="progress"><div id="progressBar"></div></div><div id="qnav" class="qnav no-print"></div></div>
<div class="card"><span id="category" class="tag"></span><div id="question" class="question"></div><div id="options"></div><div class="actions no-print"><button id="prev" class="secondary">上一题</button><div class="right"><button id="next" class="secondary">下一题</button><button id="submit" class="primary">交卷评分</button></div></div></div>
</section>
<section id="result" class="hidden">
<div class="card"><h2 style="margin-top:0">测试结果</h2><div id="identity" style="color:var(--muted);margin-bottom:10px"></div><div class="grid"><div class="metric"><small>答对题数</small><strong id="score"></strong></div><div class="metric"><small>正确率</small><strong id="percent"></strong></div><div class="metric"><small>基础判断</small><strong id="level"></strong></div></div><div id="advice" class="notice"></div></div>
<div class="card"><h3 style="margin-top:0">分模块成绩</h3><div id="modules"></div></div>
<div class="card"><h3 style="margin-top:0">错题复盘</h3><div id="wrongs"></div></div>
<div class="card no-print"><div class="actions"><button id="again" class="secondary">重新随机测试</button><div class="right"><button id="share" class="secondary">分享测试链接</button><button id="copy" class="secondary">复制成绩</button><button id="print" class="primary">打印/保存PDF</button></div></div></div>
</section>
<div class="foot">原创模拟摸底卷 · 可直接转发使用</div>
</div>

function startQuiz(){makeTest();current=0;seconds=1200;byId('who').textContent=byId('name').value.trim()||'匿名考生';byId('whoUnit').textContent=byId('unit').value.trim();byId('start').classList.add('hidden');byId('result').classList.add('hidden');byId('quiz').classList.remove('hidden');buildNav();render();clearInterval(timerId);timerId=setInterval(function(){seconds--;var m=String(Math.floor(seconds/60)).padStart(2,'0'),s=String(seconds%60).padStart(2,'0');byId('timer').textContent=m+':'+s;if(seconds<=0){clearInterval(timerId);finish(true)}},1000)}
function finish(auto){var empty=answers.filter(function(x){return x===null}).length;if(!auto&&empty&&!confirm('还有'+empty+'题未作答，确定交卷吗？'))return;clearInterval(timerId);byId('quiz').classList.add('hidden');byId('result').classList.remove('hidden');var score=test.reduce(function(n,q,i){return n+(answers[i]===q.answer?1:0)},0),pct=Math.round(score*5),lv,ad;if(score>=17){lv='基础较好';ad='适合进入真题训练和案例计算专项。'}else if(score>=13){lv='具备潜力';ad='重点补计算机知识、标准术语和案例答题。'}else if(score>=8){lv='基础偏弱';ad='建议先系统学习4—6周，再刷整套真题。'}else{lv='建议系统学习';ad='建议采用6—8周学习路线，从项目管理框架和计算机基础开始。'}byId('score').textContent=score+' / 20';byId('percent').textContent=pct+'%';byId('level').textContent=lv;byId('advice').textContent=ad;byId('identity').textContent='考生：'+byId('who').textContent+(byId('whoUnit').textContent?'　单位/班级：'+byId('whoUnit').textContent:'');var map={};test.forEach(function(q,i){if(!map[q.category])map[q.category]={c:0,t:0};map[q.category].t++;if(answers[i]===q.answer)map[q.category].c++});byId('modules').innerHTML='';Object.keys(map).forEach(function(k){var v=map[k],p=Math.round(v.c/v.t*100);byId('modules').insertAdjacentHTML('beforeend','<div class="barrow"><div class="barhead"><span>'+k+'</span><span>'+v.c+'/'+v.t+' · '+p+'%</span></div><div class="bar"><span style="width:'+p+'%"></span></div></div>')});byId('wrongs').innerHTML='';var wc=0;test.forEach(function(q,i){if(answers[i]!==q.answer){wc++;var mine=answers[i]===null?'未作答':letter(answers[i])+'. '+q.options[answers[i]];byId('wrongs').insertAdjacentHTML('beforeend','<div class="review"><b>'+(i+1)+'. '+q.text+'</b><div class="wrong">你的答案：'+mine+'</div><div class="rightans">正确答案：'+letter(q.answer)+'. '+q.options[q.answer]+'</div><div style="color:var(--muted);margin-top:5px">解析：'+q.explanation+'</div></div>')}});if(!wc)byId('wrongs').innerHTML='<div class="notice">全部答对，基础知识掌握得非常好。</div>'}
byId('startBtn').onclick=startQuiz;byId('prev').onclick=function(){if(current>0){current--;render()}};byId('next').onclick=function(){if(current<19){current++;render()}};byId('submit').onclick=function(){finish(false)};byId('again').onclick=function(){byId('result').classList.add('hidden');byId('start').classList.remove('hidden');byId('timer').textContent='20:00'};byId('print').onclick=function(){window.print()};
byId('copy').onclick=function(){var t='系统集成项目管理工程师摸底测试\n考生：'+byId('who').textContent+'\n成绩：'+byId('score').textContent+'\n正确率：'+byId('percent').textContent+'\n基础判断：'+byId('level').textContent;if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(t).then(function(){alert('成绩已复制')})}else{prompt('请长按复制成绩：',t)}};
byId('share').onclick=function(){var d={title:document.title,text:'系统集成项目管理工程师随机摸底测试',url:location.href};if(navigator.share){navigator.share(d).catch(function(){})}else if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(function(){alert('测试链接已复制')})}else{prompt('请复制测试链接：',location.href)}};
</script>
</body>
